<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Oakridge Drawings{% endblock %}</title>
  <style>
    :root{
      --bg:#0f1f2b; --panel:#16252f; --line:#24323d;
      --accent:#1f73a0; --accent-h:#2a8cc4; --text:#e9eef2; --muted:#9fb1bd;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",
      Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    header{background:#0b1620;border-bottom:1px solid var(--line);
      padding:16px 24px;display:flex;align-items:center;gap:14px;
      position:sticky;top:0;z-index:10}
    header .logo{font-weight:700;font-size:18px;letter-spacing:.2px}
    header .logo span{color:var(--accent-h)}
    header .crumb{color:var(--muted);font-size:14px}
    header .spacer{flex:1}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;
      padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;
      display:inline-flex;align-items:center;gap:8px;transition:background .15s}
    .btn:hover{background:var(--accent-h)}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
    .btn.ghost:hover{border-color:var(--accent-h)}
    main{max-width:1200px;margin:0 auto;padding:32px 24px 64px}
    .muted{color:var(--muted)}
    footer{max-width:1200px;margin:0 auto;padding:24px;color:var(--muted);
      font-size:12px;border-top:1px solid var(--line)}
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">Oakridge<span>Drawings</span></a>
    {% block crumb %}{% endblock %}
    <div class="spacer"></div>
    {% block actions %}{% endblock %}
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    Pulls from <code>{{ host if host else 'drawings.oakridge.smtresearch.ca' }}</code>
    · compiled in name order
  </footer>
</body>
</html>
